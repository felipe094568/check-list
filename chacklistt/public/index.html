<!DOCTYPE html>
<html lang="Pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css"> 
    <link rel="icon" href="IMG/images.png" type="image/png">
    
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    
    <title>Checklist</title>
</head>
<body>

 <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
  import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAW6GX8piTjKpP6kf4_yAyCzv6lmUD8PXQ",
    authDomain: "checklist-c9a9b.firebaseapp.com",
    projectId: "checklist-c9a9b",
    storageBucket: "checklist-c9a9b.firebasestorage.app",
    messagingSenderId: "1008388672891",
    appId: "1:1008388672891:web:1600d63f927751eda601de",
    measurementId: "G-LY8WNJTYSG"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getFirestore(app);

  window.db = db;
  window.collection = collection;
  window.addDoc = addDoc;
  window.getDocs = getDocs;
  window.updateDoc = updateDoc;
  window.deleteDoc = deleteDoc;
  window.doc = doc;
  
  window.dispatchEvent(new Event('firebaseCarregado'));
</script>

<div class="app-container">

    <header>
        <div class="header-top" style="display: flex; align-items: center; gap: 10px;">
            <img src="IMG/images.png" alt="Checklist Image" style="width: 40px; height: 40px; margin: 10px; border-radius: 50%;"> 
            <h1>Checklist</h1>
        </div>
        <p style="padding: 20px; margin: 0;">Organize suas tarefas e mantenha tudo em dia.</p>

        <div class="perfil-container" style="background: #222; padding: 12px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; gap: 10px;">
            <span style="font-size: 14px; color: #ccc;">Perfil atual:</span>
            
           
        </div>

        <button onclick="compartilharLista()" style="background: #4da0ff; color: #fff; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; width: 20%; margin-bottom: 10px; font-weight: bold;">🔗</button>
    </header>

    <div id="painel-lista" class="painel-conteudo">
        <div class="tabs-container">
            <button class="tab-btn">Minha lista de tarefas</button>  
        </div>
        <ul id="list-container"></ul>
    </div>

    <div id="painel-estatisticas" class="painel-conteudo" style="display: none; padding: 15px; color: #fff;">
        <h3 style="margin-bottom: 15px;">📊 Estatísticas do Dia</h3>
        <div style="background: #202020; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-around; text-align: center;">
            <div>
                <h4 id="stat-total" style="margin: 0; font-size: 20px; color: #3b82f6;">0</h4>
                <small style="color: #aaa;">Total</small>
            </div>
            <div>
                <h4 id="stat-concluidas" style="margin: 0; font-size: 20px; color: #10b981;">0</h4>
                <small style="color: #aaa;">Concluídas</small>
            </div>
        </div>
        <h4 style="font-size: 14px; color: #aaa; margin-bottom: 10px;">📋 Histórico de Concluídas</h4>
        <ul id="list-container-concluidas" style="list-style: none; padding: 0; margin: 0;"></ul>
    </div>

    <div id="painel-calendario" class="painel-conteudo" style="display: none; padding: 15px; color: #fff;">
        <h3 style="margin-bottom: 15px;">📅 Calendário de Tarefas</h3>
        <div id="calendar" style="background: #202020; padding: 10px; border-radius: 12px;"></div>
    </div>
    
    <button id="btnAdd">+</button>

</div>

<nav class="bottom-nav">
    <button class="nav-item" onclick="mudarAba('lista')"><span>🏠</span><small>Lista</small></button>
    <button class="nav-item" onclick="mudarAba('calendario')"><span>🗓️</span><small>Calendário</small></button>
    <button class="nav-item" onclick="mudarAba('estatisticas')"><span>📊</span><small>Estatísticas</small></button>
    <button class="nav-item" onclick="document.getElementById('modal-ajustes').style.display = 'flex'"><span>⚙️</span><small>Ajustes</small></button>
</nav>

<div id="modal-ajustes" class="modal-ajustes" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center; z-index: 1000;">
    <div style="background: #202020; padding: 25px; border-radius: 12px; width: 90%; max-width: 320px; color: #fff;">
        <h3 style="margin-top: 0; font-size: 18px; margin-bottom: 20px;">⚙️ Ajustes</h3>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span>Modo Claro/Escuro</span>
            <input type="checkbox" id="toggle-tema" style="cursor: pointer;">
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span>Notificações</span>
            <input type="checkbox" id="toggle-notificacao" checked style="cursor: pointer;">
        </div>
        <button id="btn-fechar-ajustes" style="width: 100%; padding: 10px; background: #444; border: none; color: #fff; border-radius: 8px; cursor: pointer;">Fechar</button>
    </div>
</div>

<div id="modal-fundo" class="modal-fundo" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center; z-index: 2000;">
    <div class="modal-conteudo" style="background: white; padding: 25px; border-radius: 20px; width: 80%; max-width: 300px; display: flex; flex-direction: column; gap: 15px;">
        <h2 style="color: #000000; border: none; padding: 10px; border-radius: 10px;">Adicionar Tarefa</h2>
        <input type="text" id="titulo" placeholder="Digite sua tarefa..." style="padding: 12px; border: 2px solid #000000; border-radius: 10px;">
        <input type="date" id="data" style="padding: 12px; border: 2px solid #050202; border-radius: 10px;">
        <input type="time" id="hora" style="padding: 12px; border: 2px solid #000000; border-radius: 10px;">
        <button id="btn-salvar" style="background-color: #000000; color: #ffffff; border: none; padding: 12px; border-radius: 10px;">Salvar</button>
        <button id="btn-cancelar" style="background-color: #000000; color: #ffffff; border: none; padding: 12px; border-radius: 10px;">Cancelar</button>
    </div>
</div>

<script src="script.js"></script>
<script src="sw.js"></script>
</body>
</html>
